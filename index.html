<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>근태계획표 2026 · Saltlux</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#2354d7; --navy2:#eef4ff; --navy3:#dfeafe;
  --panel:#ffffff; --panel2:#f7faff;
  --border:#d8e4fb; --border2:#bdd0f5;
  --text:#1f2a44; --text2:#57709b; --text3:#8da0c0;
  --cyan:#3d86ff; --cyan-dim:rgba(61,134,255,.12);
  --green:#2fc58d; --green-dim:rgba(47,197,141,.12);
  --red:#ff6b7c; --red-dim:rgba(255,107,124,.12);
  --amber:#f4b84a; --amber-dim:rgba(244,184,74,.16);
  --shadow:0 18px 50px rgba(61,103,185,.12);
  --shadow-soft:0 10px 28px rgba(61,103,185,.08);
  --mono:'JetBrains Mono',monospace;
  --sans:'NanumSquare','Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif;
  --display:'NanumSquare','Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif;
  --sidebar:228px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:
    radial-gradient(circle at top left, rgba(61,134,255,.16), transparent 28%),
    linear-gradient(180deg, #f5f9ff 0%, #eef4ff 44%, #f8fbff 100%);
  color:var(--text);
  font-family:var(--sans);
  min-height:100vh;
  font-size:14px;
  overflow-x:hidden;
}

/* ── Sidebar ── */
.sidebar {
  position:fixed; top:0; left:0; width:var(--sidebar); height:100vh;
  background:rgba(255,255,255,.88); border-right:1px solid rgba(189,208,245,.75);
  backdrop-filter:blur(18px);
  display:flex; flex-direction:column; z-index:100;
  transition:transform .3s;
  box-shadow:0 0 0 1px rgba(255,255,255,.5), 14px 0 40px rgba(81,116,188,.08);
}
.sidebar-logo {
  padding:26px 22px 20px;
  border-bottom:1px solid var(--border);
}
.logo-slx {
  font-family:var(--display); font-size:22px; font-weight:800;
  background:linear-gradient(135deg,#2f6ef7,#5da0ff 56%,#3ad4b0);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  letter-spacing:-.02em; line-height:1;
}
.logo-sub {
  font-family:var(--mono); font-size:9px; color:var(--text3);
  letter-spacing:.14em; text-transform:uppercase; margin-top:4px;
}

.sidebar-user {
  padding:18px 22px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:10px;
}
.user-avatar {
  width:38px; height:38px; border-radius:14px;
  background:linear-gradient(135deg,var(--cyan),#75a8ff);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 10px 24px rgba(61,134,255,.22);
  font-family:var(--display); font-size:14px; font-weight:700; color:white;
  flex-shrink:0;
}
.user-name { font-size:12px; font-weight:500; color:var(--text); line-height:1.3; }
.user-role { font-family:var(--mono); font-size:9px; color:var(--cyan); margin-top:3px; }

.sidebar-nav { flex:1; padding:12px 0; overflow-y:auto; }
.nav-section { padding:10px 22px 6px; font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:.12em; text-transform:uppercase; }
.nav-item {
  display:flex; align-items:center; gap:10px;
  margin:0 12px 4px; padding:12px 14px; cursor:pointer; transition:all .15s;
  font-size:13px; font-weight:700; color:var(--text2); position:relative;
  border-radius:14px;
}
.nav-item:hover { color:var(--text); background:rgba(61,134,255,.08); }
.nav-item.active {
  color:var(--cyan);
  background:linear-gradient(135deg, rgba(61,134,255,.16), rgba(61,134,255,.08));
  box-shadow:inset 0 0 0 1px rgba(61,134,255,.1);
}
.nav-item.active::before {
  content:''; position:absolute; left:10px; top:10px; bottom:10px;
  width:4px; background:linear-gradient(180deg,var(--cyan),var(--green));
  border-radius:999px;
}
.nav-icon { font-size:15px; width:18px; text-align:center; }
.nav-month-badge {
  margin-left:auto; font-family:var(--mono); font-size:9px;
  background:rgba(61,134,255,.12); color:var(--cyan);
  padding:3px 7px; border-radius:999px;
}

.sidebar-bottom {
  padding:18px 22px 22px;
  border-top:1px solid var(--border);
}
.logout-btn {
  width:100%; display:flex; align-items:center; gap:8px;
  padding:11px 14px; background:rgba(255,255,255,.72);
  border:1px solid var(--border2); border-radius:12px;
  color:var(--text2); font-family:var(--sans); font-size:12px; font-weight:500;
  cursor:pointer; transition:all .15s;
}
.logout-btn:hover { border-color:var(--red); color:var(--red); background:var(--red-dim); }

/* ── Main content ── */
.main {
  margin-left:var(--sidebar);
  min-height:100vh;
  display:flex; flex-direction:column;
}

.topbar {
  position:sticky; top:0; z-index:50;
  background:rgba(248,251,255,.84);
  backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(216,228,251,.72);
  padding:0 36px;
  height:70px;
  display:flex; align-items:center; justify-content:space-between;
}
.topbar-title {
  font-family:var(--display); font-size:22px; font-weight:800; color:var(--text);
}
.topbar-right { display:flex; align-items:center; gap:12px; }
.month-nav-btn {
  width:34px; height:34px; border-radius:10px;
  background:white; border:1px solid var(--border);
  color:var(--text2); cursor:pointer; font-size:13px;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s;
  box-shadow:var(--shadow-soft);
}
.month-nav-btn:hover { border-color:var(--cyan); color:var(--cyan); transform:translateY(-1px); }
.month-label {
  font-family:var(--mono); font-size:13px; font-weight:500;
  color:var(--text); min-width:40px; text-align:center;
  padding:0 4px;
}
.back-btn {
  display:flex; align-items:center; gap:6px;
  padding:10px 14px; border-radius:12px;
  background:white; border:1px solid var(--border);
  color:var(--text2); font-family:var(--sans); font-size:12px; font-weight:700;
  cursor:pointer; transition:all .15s;
  box-shadow:var(--shadow-soft);
}
.back-btn:hover { border-color:var(--cyan); color:var(--cyan); transform:translateY(-1px); }
.csv-btn {
  display:flex; align-items:center; gap:6px;
  padding:10px 16px; border-radius:12px;
  background:linear-gradient(135deg,#48a0ff,#5b72ff); border:none;
  color:white; font-family:var(--sans); font-size:12px; font-weight:800;
  cursor:pointer; transition:all .15s; letter-spacing:.04em;
  box-shadow:0 16px 30px rgba(91,114,255,.22);
}
.csv-btn:hover { transform:translateY(-1px); filter:brightness(1.02); }

.content {
  flex:1;
  padding:32px 36px 56px;
  max-width:1400px;
  width:100%;
  margin:0 auto;
}

/* ── Home / Year overview ── */
.section-title {
  font-family:var(--display); font-size:18px; font-weight:800;
  color:var(--text); letter-spacing:-.01em;
  margin-bottom:18px; display:flex; align-items:center; gap:10px;
}
.section-title::before {
  content:''; width:9px; height:9px;
  background:linear-gradient(180deg,var(--cyan),var(--green));
  border-radius:50%; flex-shrink:0;
}

.month-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.month-card {
  background:linear-gradient(180deg, rgba(255,255,255,.99), rgba(244,249,255,.97));
  border:1px solid rgba(216,228,251,.95);
  border-radius:24px; padding:20px; cursor:pointer;
  transition:all .22s; position:relative; overflow:hidden;
  box-shadow:0 14px 30px rgba(61,103,185,.08);
}
.month-card::after {
  content:'';
  position:absolute;
  right:-24px;
  bottom:-24px;
  width:100px;
  height:100px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(61,134,255,.10), transparent 70%);
}
.month-card:hover { border-color:rgba(61,134,255,.4); transform:translateY(-6px); box-shadow:0 22px 42px rgba(61,134,255,.14); }
.month-card.current { border-color:rgba(61,134,255,.52); box-shadow:0 20px 40px rgba(61,134,255,.12); }
.month-card.current::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,var(--cyan),var(--green)); }
.mc-num { font-family:var(--mono); font-size:10px; color:var(--text3); letter-spacing:.08em; margin-bottom:8px; }
.mc-period { font-family:var(--mono); font-size:9px; color:var(--text3); margin-bottom:12px; line-height:1.5; }
.mc-hours { font-family:var(--display); font-size:24px; font-weight:800; color:var(--text); line-height:1; margin-bottom:6px; }
.mc-hours.has-data { color:var(--cyan); }
.mc-sub { font-size:11px; color:var(--text2); }
.mc-bar { height:8px; background:#edf3ff; border-radius:999px; margin-top:14px; overflow:hidden; }
.mc-bar-fg { height:100%; border-radius:999px; transition:width .4s; }

/* ── Dashboard ── */
.dash-grid { display:grid; grid-template-columns:1.3fr 1fr; gap:12px; margin-bottom:12px; }
.dash-card {
  background:linear-gradient(135deg,#ffffff 0%, #f5f9ff 100%);
  border:1px solid var(--border);
  border-radius:24px; padding:24px 26px;
  box-shadow:var(--shadow);
}
.dash-card-title { font-family:var(--mono); font-size:10px; color:var(--text3); letter-spacing:.1em; text-transform:uppercase; margin-bottom:12px; }
.month-total-val { font-family:var(--display); font-size:42px; font-weight:800; color:var(--cyan); line-height:1; }
.month-total-val small { font-size:15px; color:var(--text3); font-weight:500; margin-left:8px; }
.month-diff-txt { font-family:var(--mono); font-size:12px; margin-top:8px; }
.prog-bg { height:10px; background:#edf3ff; border-radius:999px; overflow:hidden; margin-top:16px; }
.prog-fg { height:100%; border-radius:999px; transition:width .4s; }
.prog-meta { display:flex; justify-content:space-between; margin-top:8px; font-size:10px; color:var(--text3); font-family:var(--mono); }

.kpi-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.kpi {
  background:linear-gradient(180deg, #ffffff 0%, #f7faff 100%);
  border:1px solid var(--border); border-radius:20px; padding:16px;
  box-shadow:var(--shadow-soft);
}
.kpi-label { font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:.08em; text-transform:uppercase; margin-bottom:6px; }
.kpi-val { font-family:var(--display); font-size:24px; font-weight:800; line-height:1; }
.kpi-sub { font-size:11px; color:var(--text2); margin-top:6px; }

.chart-card {
  background:linear-gradient(180deg, #ffffff 0%, #f7faff 100%);
  border:1px solid var(--border);
  border-radius:24px; padding:24px 26px; margin-bottom:18px;
  box-shadow:var(--shadow);
}
.week-bars { display:flex; gap:12px; align-items:flex-end; height:140px; padding-top:8px; }
.wbar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
.wbar-val { font-family:var(--mono); font-size:9px; font-weight:500; white-space:nowrap; min-height:13px; }
.wbar-outer { width:100%; background:#edf3ff; border-radius:12px; flex:1; position:relative; min-height:82px; }
.wbar-inner { width:100%; position:absolute; bottom:0; border-radius:3px; transition:height .4s; }
.wbar-tgt { position:absolute; left:0; right:0; border-top:1px dashed rgba(87,112,155,.45); }
.wbar-wlabel { font-family:var(--mono); font-size:9px; color:var(--text3); }
.wbar-days { font-family:var(--mono); font-size:8px; color:var(--text3); }

/* ── Week blocks ── */
.wblock {
  background:linear-gradient(180deg, #ffffff 0%, #f9fbff 100%);
  border:1px solid var(--border); border-radius:22px; overflow:hidden; margin-bottom:14px;
  box-shadow:var(--shadow-soft);
}
.whead {
  display:flex; align-items:center; justify-content:space-between; padding:16px 18px;
  background:linear-gradient(180deg, #f7faff 0%, #f2f7ff 100%);
  border-bottom:1px solid var(--border); cursor:pointer; user-select:none; transition:background .1s;
}
.whead:hover { background:#edf4ff; }
.wtitle { font-family:var(--mono); font-size:11px; color:var(--text2); letter-spacing:.03em; }
.winfo { display:flex; align-items:center; gap:10px; }
.wbar-bg { width:76px; height:8px; background:#eaf1ff; border-radius:999px; overflow:hidden; }
.wbar-fg { height:100%; border-radius:2px; transition:width .35s; }
.wtotal { font-family:var(--mono); font-size:13px; font-weight:600; min-width:44px; text-align:right; }
.wdiff { font-family:var(--mono); font-size:10px; padding:5px 8px; border-radius:999px; min-width:56px; text-align:center; }
.dov { background:var(--red-dim); color:var(--red); }
.dun { background:var(--cyan-dim); color:var(--cyan); }
.dok { background:var(--green-dim); color:var(--green); }
.dna { background:rgba(141,160,192,.16); color:var(--text3); }
.wtoggle { font-size:9px; color:var(--text3); transition:transform .2s; }
.wtoggle.open { transform:rotate(180deg); }

.drows { display:none; }
.drows.open { display:block; }
.drow {
  display:grid; grid-template-columns:44px 26px 86px 86px 74px 96px 62px;
  align-items:center; padding:0 18px; min-height:54px;
  border-bottom:1px solid rgba(216,228,251,.75); transition:background .1s; gap:6px;
}
.drow:last-child { border-bottom:none; }
.drow:hover { background:rgba(61,134,255,.04); }
.drow.wknd { background:rgba(61,134,255,.025); }
.drow.today { background:rgba(61,134,255,.06); border-left:3px solid var(--cyan); }
.ddate { font-family:var(--mono); font-size:12px; color:var(--text2); }
.ddow { font-size:12px; color:var(--text3); }
.ddow.sat { color:var(--cyan); }
.ddow.sun { color:var(--red); }

.twrap {
  display:flex; align-items:center; width:fit-content;
  background:white; border:1px solid var(--border); border-radius:10px;
  padding:0 8px; transition:border-color .15s, box-shadow .15s;
  box-shadow:0 4px 12px rgba(61,103,185,.04);
}
.twrap:focus-within { border-color:var(--cyan); }
.twrap.disabled { opacity:.2; pointer-events:none; }
.twrap.invalid { border-color:var(--red); }
.tinput { background:transparent; border:none; color:var(--text); font-family:var(--mono); font-size:12px; width:52px; padding:8px 0; outline:none; text-align:center; }
.tinput::placeholder { color:var(--text3); font-size:11px; }
.tinput:focus { color:var(--cyan); }
select.dtype {
  background:white; border:1px solid var(--border); color:var(--text2);
  font-family:var(--sans); font-size:12px; outline:none; cursor:pointer;
  padding:8px 10px; width:100%; border-radius:12px; box-shadow:0 4px 12px rgba(61,103,185,.04);
}
select.dtype option { background:var(--panel2); color:var(--text); }
.dhours { font-family:var(--mono); font-size:12px; font-weight:600; text-align:right; color:var(--text3); }
.dhours.h-hi { color:var(--green); }
.dhours.h-md { color:var(--cyan); }
.dhours.h-lo { color:var(--amber); }

.wfoot {
  padding:12px 18px; background:rgba(61,134,255,.04);
  border-top:1px dashed rgba(61,134,255,.18); font-family:var(--mono);
  font-size:11px; color:var(--text3); display:flex; gap:16px; flex-wrap:wrap;
}
.wfoot b { font-weight:500; }

/* ── Login ── */
.login-bg {
  position:fixed; inset:0; z-index:999;
  background:
    radial-gradient(circle at top left, rgba(61,134,255,.22), transparent 30%),
    linear-gradient(180deg, #f4f8ff 0%, #eaf2ff 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0;
}
.login-box {
  background:rgba(255,255,255,.95); border:1px solid rgba(216,228,251,.95);
  border-radius:28px; padding:54px 42px; width:400px;
  text-align:center; position:relative; overflow:hidden;
  box-shadow:0 28px 60px rgba(61,103,185,.16);
}
.login-box::before {
  content:''; position:absolute; top:0; left:0; right:0; height:6px;
  background:linear-gradient(90deg,var(--cyan),#5b72ff,var(--green));
}
.login-logo { font-family:var(--display); font-size:30px; font-weight:700; background:linear-gradient(135deg,#2f6ef7,#5da0ff 56%,#3ad4b0); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:6px; }
.login-sub { font-family:var(--mono); font-size:10px; color:var(--text3); letter-spacing:.14em; text-transform:uppercase; margin-bottom:12px; }
.login-title { font-size:18px; font-weight:400; color:var(--text); margin-bottom:30px; }
.google-btn {
  width:100%; display:flex; align-items:center; justify-content:center; gap:10px;
  padding:14px 20px; background:white; border:1px solid var(--border); border-radius:14px;
  font-size:14px; font-weight:600; color:#333; cursor:pointer;
  transition:all .15s; box-shadow:0 14px 26px rgba(61,103,185,.12);
}
.google-btn:hover { transform:translateY(-1px); box-shadow:0 18px 30px rgba(61,103,185,.14); }

/* ── Toast ── */
.toast {
  position:fixed; bottom:24px; right:24px; background:white;
  border:1px solid rgba(47,197,141,.24); color:var(--green); font-family:var(--mono);
  font-size:11px; padding:10px 16px; border-radius:14px; opacity:0;
  transform:translateY(6px); transition:all .25s; pointer-events:none; z-index:999;
  box-shadow:var(--shadow-soft);
}
.toast.show { opacity:1; transform:translateY(0); }

.home-hero,
.month-hero {
  display:grid;
  grid-template-columns:minmax(0,1.12fr) minmax(300px,.88fr);
  gap:22px;
  padding:30px 32px;
  margin-bottom:22px;
  border-radius:32px;
  background:
    radial-gradient(circle at top right, rgba(61,134,255,.20), transparent 30%),
    radial-gradient(circle at left bottom, rgba(47,197,141,.10), transparent 24%),
    linear-gradient(135deg, #ffffff 0%, #f7fbff 52%, #edf4ff 100%);
  border:1px solid rgba(216,228,251,.98);
  box-shadow:0 24px 54px rgba(61,103,185,.12);
  overflow:hidden;
  position:relative;
}
.home-hero::before,
.month-hero::before {
  content:'';
  position:absolute;
  inset:0;
  background:
    linear-gradient(115deg, rgba(255,255,255,.75), transparent 40%),
    repeating-linear-gradient(90deg, transparent 0 84px, rgba(216,228,251,.16) 84px 85px);
  pointer-events:none;
}
.home-hero::after,
.month-hero::after {
  content:'';
  position:absolute;
  right:-30px;
  top:-42px;
  width:220px;
  height:220px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(61,134,255,.16), transparent 68%);
}
.hero-copy,
.month-hero-copy {
  position:relative;
  z-index:1;
  align-self:center;
}
.hero-eyebrow,
.month-hero-eyebrow {
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 14px;
  margin-bottom:18px;
  border-radius:999px;
  background:linear-gradient(135deg, rgba(61,134,255,.13), rgba(47,197,141,.10));
  color:var(--cyan);
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:.12em;
  text-transform:uppercase;
  box-shadow:inset 0 0 0 1px rgba(61,134,255,.08);
}
.hero-title,
.month-hero-title {
  font-family:var(--display);
  font-size:40px;
  line-height:1.05;
  letter-spacing:-.04em;
  font-weight:800;
  color:var(--text);
}
.hero-desc,
.month-hero-desc {
  max-width:590px;
  margin-top:14px;
  color:var(--text2);
  font-size:16px;
  line-height:1.85;
  font-weight:700;
}
.month-hero-metrics {
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:20px;
}
.month-chip {
  min-width:120px;
  padding:13px 15px;
  border-radius:18px;
  background:rgba(255,255,255,.90);
  border:1px solid rgba(216,228,251,.95);
  box-shadow:var(--shadow-soft);
}
.month-chip-label {
  display:block;
  font-family:var(--mono);
  font-size:9px;
  letter-spacing:.08em;
  color:var(--text3);
  text-transform:uppercase;
  margin-bottom:6px;
}
.month-chip-value {
  display:block;
  font-family:var(--display);
  font-size:22px;
  font-weight:800;
  color:var(--text);
  line-height:1;
}
.hero-visual,
.month-hero-visual {
  position:relative;
  min-height:210px;
  border-radius:24px;
  background:
    linear-gradient(180deg, rgba(61,134,255,.08), rgba(61,134,255,.02)),
    white;
  border:1px solid rgba(216,228,251,.95);
  overflow:hidden;

<script>

var M = Math.min(12, Math.max(1, new Date().getMonth() + 1));

function buildSidebarMonths() {

      el.onclick = function() { goMonth(month); };
      nav.appendChild(el);
    })(m);

}

function setNavActive(id) {
  document.querySelectorAll('.nav-item').forEach(function(el){ el.classList.remove('active'); });
  var el = document.getElementById(id);
  if (el) el.classList.add('active');
}

function lsKey(m) { return 'att26_' + (currentUser ? currentUser.uid : 'guest') + '_' + m; }
function load(m) {
  if (localCache[m]) return localCache[m];
  try {
    var d = JSON.parse(localStorage.getItem(lsKey(m))) || {};
    localCache[m] = d;
    return d;
  } catch(e) {
    return {};
  }
}
function save(m, d) {
  if (!currentUser) return;
  localCache[m] = d;
  localStorage.setItem(lsKey(m), JSON.stringify(d));
  db.collection('users').doc(currentUser.uid).collection('attendance').doc('m'+m).set(d)
    .then(function(){ showToast('✓ 저장됨'); })
    .catch(function(){ showToast('⚠ 오프라인 저장됨'); });
}
function loadFromFirebase(m, callback) {
  if (!currentUser) { callback(load(m)); return; }
  db.collection('users').doc(currentUser.uid).collection('attendance').doc('m'+m).get()
    .then(function(doc){
      if (doc.exists) {
        var d = doc.data();
        localCache[m] = d;
        localStorage.setItem(lsKey(m), JSON.stringify(d));
        callback(d);
      } else {
        callback(load(m));
      }
    }).catch(function(){
      callback(load(m));
    });
}
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg || '저장됨';
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.classList.remove('show'); }, 1600);
}

function daysInMonth(m) {
  var n = new Date(Y,m,0).getDate(), days = [];
  for (var d=1; d<=n; d++) {
    var dt = new Date(Y,m-1,d);
    days.push({d:d,dow:['일','월','화','수','목','금','토'][dt.getDay()],dt:dt});
  }
  return days;
}
function weekNum(dt) {
  var d = new Date(Date.UTC(dt.getFullYear(),dt.getMonth(),dt.getDate()));
  var dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate()+4-dayNum);
  var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil((((d-yearStart)/86400000)+1)/7);
}
function weekTarget(wd){
  return wd.filter(function(d){return d.dow!=='토'&&d.dow!=='일';}).length * TARGET_DAY;
}
function lunchDeduct(inT,outT){
  var toMin=function(t){var p=t.split(':').map(Number);return p[0]*60+p[1];};
  var overlap=Math.min(toMin(outT),13*60)-Math.max(toMin(inT),12*60);
  return overlap>0?overlap/60:0;
}
function calcH(inT,outT,type,brk) {
  var extra=brk?parseBreak(brk):0;
  if(type==='연차'||type==='공휴일') return TARGET_DAY;
  if(type==='반차'){
    var actual=(inT&&outT)?Math.max(0,timeDiff(inT,outT)-lunchDeduct(inT,outT)-extra):0;
    return TARGET_DAY/2+actual;
  }
  if(!inT||!outT) return 0;
  return Math.max(0,timeDiff(inT,outT)-lunchDeduct(inT,outT)-extra);
}
function parseBreak(v){
  if(!v) return 0;
  var p=v.split(':').map(Number);
  if(p.length===2&&!isNaN(p[0])&&!isNaN(p[1])) return p[0]+p[1]/60;
  return 0;
}
function timeDiff(a,b){
  var ap=a.split(':').map(Number), bp=b.split(':').map(Number);
  if(isNaN(ap[0])||isNaN(bp[0])) return 0;
  return (bp[0]*60+bp[1]-ap[0]*60-ap[1])/60;
}
function fh(h){
  if(!h||h<=0) return '—';
  var t=Math.round(h*60);
  return Math.floor(t/60)+':'+String(t%60).padStart(2,'0');
}
function fhBig(h){
  if(!h||h<=0) return '0H';
  var t=Math.round(h*60);
  var hh=Math.floor(t/60), mm=t%60;
  return mm>0?hh+'H '+mm+'M':hh+'H';
}
function isToday(d,m){
  var t=new Date();
  return t.getFullYear()===Y&&t.getMonth()+1===(m||M)&&t.getDate()===d;
}
function wdTotal(wd,data){
  return wd.reduce(function(s,day){
    if(day.otherMonth){
      var od=load(day.m);
      var r=od[day.m+'-'+day.d]||{};
      return s+calcH(r.in,r.out,r.type||'해당없음',r.brk);
    }
    var rec=data[day.m+'-'+day.d]||{};
    return s+calcH(rec.in,rec.out,rec.type||'해당없음',rec.brk);
  },0);
}

var PERIODS = {
  1:{start:[2026,1,5],end:[2026,2,1]}, 2:{start:[2026,2,2],end:[2026,3,1]},
  3:{start:[2026,3,2],end:[2026,4,5]}, 4:{start:[2026,4,6],end:[2026,5,3]},
  5:{start:[2026,5,4],end:[2026,5,31]}, 6:{start:[2026,6,1],end:[2026,7,5]},
  7:{start:[2026,7,6],end:[2026,8,2]}, 8:{start:[2026,8,3],end:[2026,9,6]},
  9:{start:[2026,9,7],end:[2026,10,4]}, 10:{start:[2026,10,5],end:[2026,11,1]},
  11:{start:[2026,11,2],end:[2026,12,6]}, 12:{start:[2026,12,7],end:[2027,1,3]}
};
function getPeriod(m){
  var p=PERIODS[m];
  return {start:new Date(p.start[0],p.start[1]-1,p.start[2]),end:new Date(p.end[0],p.end[1]-1,p.end[2])};
}
function buildWmap(){
  var period=getPeriod(M), wmap={}, cur=new Date(period.start);
  while(cur<=period.end){
    var wn=weekNum(cur);
    if(!wmap[wn]) wmap[wn]=[];
    var dayM=cur.getMonth()+1, dayD=cur.getDate();
    var dow=['일','월','화','수','목','금','토'][cur.getDay()];
    wmap[wn].push({d:dayD,m:dayM,dow:dow,dt:new Date(cur),otherMonth:dayM!==M});
    cur.setDate(cur.getDate()+1);
  }
  return wmap;
}

var MONTH_NAMES=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function getMonthTotal(m){
  var p=getPeriod(m), total=0, cur=new Date(p.start);
  while(cur<=p.end){
    var dayM=cur.getMonth()+1, dayD=cur.getDate();
    var data=load(dayM);
    var rec=data[dayM+'-'+dayD]||{};
    total+=calcH(rec.in,rec.out,rec.type||'해당없음',rec.brk);
    cur.setDate(cur.getDate()+1);
  }
  return total;
}
function getMonthTarget(m){
  var p=getPeriod(m), cnt=0, cur=new Date(p.start);
  while(cur<=p.end){
    var dow=['일','월','화','수','목','금','토'][cur.getDay()];
    if(dow!=='토'&&dow!=='일') cnt++;
    cur.setDate(cur.getDate()+1);
  }
  return cnt*TARGET_DAY;
}
function periodStr(m){
  var p=PERIODS[m], s=p.start, e=p.end;
  var ey=e[0]!==2026?e[0]+'년 ':'';
  return s[1]+'월 '+String(s[2]).padStart(2,'0')+'일 ~ '+ey+e[1]+'월 '+String(e[2]).padStart(2,'0')+'일';
}

function renderHome(){
  currentView='home';
  setNavActive('navHome');
  document.getElementById('topbarTitle').textContent = '연간 현황';
  document.getElementById('topbarRight').innerHTML = '';
  var content = document.getElementById('mainContent');
  content.innerHTML = '<div style="color:var(--text3);font-family:var(--mono);font-size:12px;text-align:center;padding:40px">데이터 불러오는 중...</div>';
  var loaded=0, totals={};
  for(var m=1;m<=12;m++){
    (function(month){
      loadFromFirebase(month,function(){
        totals[month]=getMonthTotal(month);
        loaded++;
        if(loaded===12) renderHomeContent(totals);
      });
    })(m);
  }
}

function renderHomeContent(totals){
  var cur=new Date().getMonth()+1;
  var html =
  '<div class="home-hero">' +
    '<div class="hero-copy">' +
      '<div class="hero-eyebrow">SLX Team · 46H Attendance</div>' +
      '<div class="hero-title">한 해 근무 흐름을<br>더 깔끔하게 확인하세요</div>' +
      '<div class="hero-desc">회사 기준 정산 기간과 주차별 목표를 반영해 월별 진행 상태를 한눈에 정리했습니다.</div>' +
    '</div>' +
    '<div class="hero-visual">' +
      '<div class="hero-grid"></div>' +
    '</div>' +
  '</div>';

  html += '<div class="section-title">월별 현황</div>';
  html += '<div class="month-grid">';
  for(var m=1;m<=12;m++){
    var total=totals[m]||0, target=getMonthTarget(m);
    var hasData=total>0, p=target>0?Math.min(100,(total/target)*100):0;
    var d2=total-target;
    var bc=d2>0.05?'var(--red)':d2<-0.05?(hasData?'var(--cyan)':'var(--border)'):'var(--green)';
    var isCur=(m===cur);
    html+='<div class="month-card'+(isCur?' current':'')+'" onclick="goMonth('+m+')">' +
      '<div class="mc-num">'+String(m).padStart(2,'0')+' '+MONTH_NAMES[m-1]+(isCur?' <span style="color:var(--cyan);font-size:8px">●</span>':'')+' </div>' +
      '<div class="mc-period">'+periodStr(m)+'</div>' +
      '<div class="mc-hours'+(hasData?' has-data':'')+'">'+(hasData?fhBig(total):'— —')+'</div>' +
      '<div class="mc-sub">'+(hasData?'목표 '+fhBig(target):'미입력')+'</div>' +
      '<div class="mc-bar"><div class="mc-bar-fg" style="width:'+p.toFixed(1)+'%;background:'+bc+'"></div></div>' +
    '</div>';
  }
  html+='</div>';
  document.getElementById('mainContent').innerHTML=html;
}

function goHome(){
  renderHome();
  closeSidebar();
}

function goMonth(m){
  M=m;
  currentView='month';
  setNavActive('navM'+m);
  closeSidebar();
  document.getElementById('topbarTitle').textContent = MONTH_NAMES[m-1]+' 근태';
  document.getElementById('topbarRight').innerHTML =
    '<button class="back-btn" onclick="goHome()">← 연간</button>' +
    '<button class="month-nav-btn" id="prev">&#8592;</button>' +
    '<span class="month-label" id="mlabel">'+m+'월</span>' +
    '<button class="month-nav-btn" id="next">&#8594;</button>' +
    '<button class="csv-btn" onclick="exportCSV()">↓ CSV</button>';
  document.getElementById('prev').onclick = function(){ if(M>1){M--;goMonth(M);} };
  document.getElementById('next').onclick = function(){ if(M<12){M++;goMonth(M);} };
  render();
}

function render(){
  document.getElementById('mlabel') && (document.getElementById('mlabel').textContent=M+'월');
  loadFromFirebase(M,function(data){
    var wmap=buildWmap();
    renderDashboard(wmap,data);
    renderWeeks(wmap,data);
  });
}

function renderDashboard(wmap,data){
  var mTotal=0,mTarget=0,wCount=0,ov=0,un=0,weekList=[];
  Object.keys(wmap).forEach(function(wn){
    var wd=wmap[wn];
    var hasWork=wd.some(function(d){return d.dow!=='토'&&d.dow!=='일';});
    if(!hasWork) return;
    var wt=wdTotal(wd,data), wtgt=weekTarget(wd);
    var workDays=wd.filter(function(d){return d.dow!=='토'&&d.dow!=='일';}).length;
    mTotal+=wt; mTarget+=wtgt; wCount++;
    if(wt>wtgt+0.05) ov++;
    else if(wt<wtgt-0.05&&wt>0) un++;
    weekList.push({wn:wn,wt:wt,wtgt:wtgt,workDays:workDays});
  });

  var pct=mTarget>0?Math.min(100,(mTotal/mTarget)*100):0;
  var mDiff=mTotal-mTarget;
  var mc=mDiff>0.05?'var(--red)':mDiff<-0.05?'var(--cyan)':'var(--green)';
  var mDiffTxt=mDiff>0.05?'+'+fh(mDiff)+' 초과':mDiff<-0.05?fh(Math.abs(mDiff))+' 부족':'목표 달성 ✓';
  var remain=Math.max(0,mTarget-mTotal);
  var over=Math.max(0,mTotal-mTarget);
  var ringBase=Math.min(100,pct);
  var ringOver=Math.min(18,mTarget>0?(over/mTarget)*100:0);

  var maxH=0;
  weekList.forEach(function(w){ maxH=Math.max(maxH,w.wt,w.wtgt); });
  if(maxH<=0) maxH=46;

  var barsHtml='';
  weekList.forEach(function(w){
    var fp=Math.min(100,(w.wt/maxH)*100);
    var tp=Math.min(100,(w.wtgt/maxH)*100);
    var bc=w.wt>w.wtgt+0.05?'var(--red)':w.wt<w.wtgt-0.05?(w.wt>0?'var(--cyan)':'var(--border)'):'var(--green)';
    barsHtml+='<div class="wbar-col">'+
      '<div class="wbar-val" style="color:'+(w.wt>0?bc:'var(--text3)')+'">'+(w.wt>0?fh(w.wt):'—')+'</div>'+
      '<div class="wbar-outer"><div class="wbar-inner" style="height:'+fp.toFixed(1)+'%;background:'+bc+'"></div><div class="wbar-tgt" style="bottom:'+tp.toFixed(1)+'%"></div></div>'+
      '<div class="wbar-wlabel">W'+w.wn+'</div>'+
      '<div class="wbar-days">'+w.workDays+'일</div>'+
    '</div>';
  });

  var html=
    '<div class="month-hero">'+
      '<div class="month-hero-copy">'+
        '<div class="month-hero-eyebrow">'+MONTH_NAMES[M-1]+' Settlement Period</div>'+
        '<div class="month-hero-title">'+MONTH_NAMES[M-1]+' 근무 현황과<br>주차별 밸런스</div>'+
        '<div class="month-hero-desc">'+periodStr(M)+' 기간 기준으로 목표 시간, 주간 편차, 미달/초과 상태를 한 번에 확인할 수 있습니다.</div>'+
        '<div class="month-hero-metrics">'+
          '<div class="month-chip"><span class="month-chip-label">Total</span><span class="month-chip-value">'+fhBig(mTotal)+'</span></div>'+
          '<div class="month-chip"><span class="month-chip-label">Target</span><span class="month-chip-value">'+fhBig(mTarget)+'</span></div>'+
          '<div class="month-chip"><span class="month-chip-label">Weeks</span><span class="month-chip-value">'+wCount+'주</span></div>'+
        '</div>'+
      '</div>'+
      '<div class="month-hero-visual">'+
        '<div class="hero-grid"></div>'+
        '<div class="ring-dashboard">'+
          '<div class="ring-panel">'+
            '<div class="ring-wrap" style="--pct:'+ringBase.toFixed(2)+';--base:'+ringBase.toFixed(2)+';--over:'+ringOver.toFixed(2)+'">'+
              '<div class="ring-over"></div>'+
              '<div class="ring-track"></div>'+
              '<div class="ring-hole">'+
                '<div class="ring-hole-label">총 근무</div>'+
                '<div class="ring-hole-value">'+fh(mTotal)+'</div>'+
                '<div class="ring-hole-sub">'+pct.toFixed(1)+'% 달성</div>'+
              '</div>'+
            '</div>'+
            '<div class="ring-legend">'+
              '<div class="ring-legend-item"><span class="ring-dot worked"></span><div><span class="ring-legend-label">Worked</span><span class="ring-legend-value">'+fhBig(mTotal)+'</span></div></div>'+
              '<div class="ring-legend-item"><span class="ring-dot remaining"></span><div><span class="ring-legend-label">Remaining</span><span class="ring-legend-value">'+(remain>0?fh(remain):'0:00')+'</span></div></div>'+
              '<div class="ring-legend-item"><span class="ring-dot over"></span><div><span class="ring-legend-label">Over</span><span class="ring-legend-value">'+(over>0?fh(over):'0:00')+'</span></div></div>'+
            '</div>'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div class="section-title">'+MONTH_NAMES[M-1]+' 대시보드</div>'+
    '<div class="dash-grid">'+
      '<div class="dash-card">'+
        '<div class="dash-card-title">이번 달 총 근무시간</div>'+
        '<div class="month-total-val">'+fhBig(mTotal)+'<small>/ '+fhBig(mTarget)+'</small></div>'+
        '<div class="month-diff-txt" style="color:'+mc+'">'+mDiffTxt+'</div>'+
        '<div class="prog-bg"><div class="prog-fg" style="width:'+pct.toFixed(1)+'%;background:'+mc+'"></div></div>'+
        '<div class="prog-meta"><span>'+pct.toFixed(1)+'% 달성</span><span>목표 '+fhBig(mTarget)+'</span></div>'+
      '</div>'+
      '<div class="kpi-grid">'+
        '<div class="kpi"><div class="kpi-label">주간 평균</div><div class="kpi-val" style="color:var(--cyan)">'+(wCount>0?fh(mTotal/wCount):'—')+'</div><div class="kpi-sub">목표 46:00</div></div>'+
        '<div class="kpi"><div class="kpi-label">근무 주수</div><div class="kpi-val">'+wCount+'<span style="font-size:13px;color:var(--text3)">주</span></div><div class="kpi-sub">이번 달</div></div>'+
        '<div class="kpi"><div class="kpi-label">초과 주</div><div class="kpi-val" style="color:var(--red)">'+ov+'</div><div class="kpi-sub">목표 초과</div></div>'+
        '<div class="kpi"><div class="kpi-label">미달 주</div><div class="kpi-val" style="color:var(--amber)">'+un+'</div><div class="kpi-sub">목표 미달</div></div>'+
      '</div>'+
    '</div>'+
    '<div class="chart-card">'+
      '<div class="dash-card-title">주차별 근무시간 · 점선 = 해당 주 목표</div>'+
      '<div class="week-bars">'+(barsHtml||'<span style="font-size:12px;color:var(--text3);font-family:var(--mono)">입력된 데이터 없음</span>')+'</div>'+
    '</div>';

  document.getElementById('dashboard').innerHTML=html;
}

function renderWeeks(wmap,data){
  var weeksEl=document.getElementById('weeks');
  weeksEl.innerHTML='';
  var idx=0;
  Object.keys(wmap).forEach(function(wn){
    var wd=wmap[wn];
    var hasWork=wd.some(function(d){return d.dow!=='토'&&d.dow!=='일';});
    var wt=wdTotal(wd,data), wtgt=weekTarget(wd), diff=wt-wtgt;
    var pct=wtgt>0?Math.min(100,(wt/wtgt)*100):0;
    var bc=diff>0.05?'var(--red)':diff<-0.05?'var(--cyan)':wt>0?'var(--green)':'var(--border2)';
    var dl=!hasWork?'N/A':wt===0?'미입력':diff>0.05?'+'+fh(diff):diff<-0.05?'-'+fh(Math.abs(diff)):'달성';
    var dc=!hasWork||wt===0?'dna':diff>0.05?'dov':diff<-0.05?'dun':'dok';
    var isCur=wd.some(function(d){return isToday(d.d,d.m);});
    var open=isCur||(idx===0&&M===new Date().getMonth()+1);
    var rowsHtml='';
    wd.forEach(function(day){ rowsHtml+=buildRow(day,data); });
    var fd=wd[0], ld=wd[wd.length-1];
    var sl=fd.m!==M?fd.m+'월 '+fd.d+'일('+fd.dow+')':M+'월 '+fd.d+'일('+fd.dow+')';
    var el2=ld.m!==M?ld.m+'월 '+ld.d+'일('+ld.dow+')':M+'월 '+ld.d+'일('+ld.dow+')';
    var pl=sl+' ~ '+el2;

    var div=document.createElement('div');
    div.className='wblock';
    div.id='wb'+wn;
    div.innerHTML=
      '<div class="whead" onclick="toggleW(\''+wn+'\')">'+
        '<div class="wtitle">'+pl+' &nbsp;·&nbsp; 목표 '+fh(wtgt)+'</div>'+
        '<div class="winfo">'+
          '<div class="wbar-bg"><div class="wbar-fg" id="wbar'+wn+'" style="width:'+pct+'%;background:'+bc+'"></div></div>'+
          '<div class="wtotal" id="wt'+wn+'" style="color:'+bc+'">'+fh(wt)+'</div>'+
          '<div class="wdiff '+dc+'" id="wd'+wn+'">'+dl+'</div>'+
          '<div class="wtoggle '+(open?'open':'')+'" id="wto'+wn+'">▼</div>'+
        '</div>'+
      '</div>'+
      '<div class="drows '+(open?'open':'')+'" id="wr'+wn+'">'+rowsHtml+'<div class="wfoot" id="wf'+wn+'">'+footerHtml(wt,wtgt)+'</div></div>';
    weeksEl.appendChild(div);
    idx++;
  });
}

function footerHtml(wt,wtgt){
  var d=wt-wtgt;
  var rem=Math.max(0,wtgt-wt);
  var bc=d>0.05?'var(--red)':d<-0.05?'var(--cyan)':'var(--green)';
  return '<span>목표 <b style="color:var(--cyan)">'+fh(wtgt)+'</b></span><span>현재 <b style="color:'+bc+'">'+fh(wt)+'</b></span><span>잔여 <b style="color:var(--text2)">'+fh(rem)+'</b></span>';
}

function buildRow(day,data){
  var dayM=day.m||M;
  var dayData=dayM!==M?load(dayM):data;
  var dk=dayM+'-'+day.d;
  var rec=dayData[dk]||{};
  var type=rec.type||'해당없음';
  var isWknd=day.dow==='토'||day.dow==='일';
  var noTime=type==='연차'||type==='공휴일';
  var h=calcH(rec.in,rec.out,type,rec.brk);
  var hc=h>=10?'h-hi':h>=7?'h-md':h>0?'h-lo':'';
  var dowC=day.dow==='토'?'sat':day.dow==='일'?'sun':'';
  var dis=noTime?' disabled':'';
  var wn=weekNum(day.dt);
  var dl=day.otherMonth?'<span style="color:var(--text3);font-size:10px">'+dayM+'/</span>'+String(day.d).padStart(2,'0'):String(day.d).padStart(2,'0');

  return '<div class="drow'+(isWknd?' wknd':'')+(isToday(day.d,dayM)?' today':'')+'" id="dr'+dk+'">'+
    '<div class="ddate">'+dl+'</div>'+
    '<div class="ddow '+dowC+'">'+day.dow+'</div>'+
    '<div class="twrap'+(noTime?' disabled':'')+'" id="twin'+dk+'"><input class="tinput" id="tiin'+dk+'" value="'+(rec.in||'')+'" placeholder="--:--" maxlength="5"'+dis+' oninput="onTInput(this)" onblur="onTBlur(this,\''+dk+'\',\'in\','+dayM+')" onkeydown="onTKey(event)"></div>'+
    '<div class="twrap'+(noTime?' disabled':'')+'" id="twout'+dk+'"><input class="tinput" id="tiout'+dk+'" value="'+(rec.out||'')+'" placeholder="--:--" maxlength="5"'+dis+' oninput="onTInput(this)" onblur="onTBlur(this,\''+dk+'\',\'out\','+dayM+')" onkeydown="onTKey(event)"></div>'+
    '<div class="twrap'+(noTime?' disabled':'')+'" id="twbrk'+dk+'"><input class="tinput" id="tibrk'+dk+'" value="'+(rec.brk||'')+'" placeholder="휴게--:--" maxlength="5" style="width:60px;color:var(--amber)"'+dis+' oninput="onTInput(this)" onblur="onTBlur(this,\''+dk+'\',\'brk\','+dayM+')" onkeydown="onTKey(event)"></div>'+
    '<select class="dtype" id="tp'+dk+'" onchange="onType(\''+dk+'\',this.value,'+wn+','+dayM+')">'+
      '<option value="해당없음"'+(type==='해당없음'?' selected':'')+'>—</option>'+
      '<option value="연차"'+(type==='연차'?' selected':'')+'>연차</option>'+
      '<option value="반차"'+(type==='반차'||type==='오전반차'||type==='오후반차'?' selected':'')+'>반차</option>'+
      '<option value="공휴일"'+(type==='공휴일'?' selected':'')+'>공휴일</option>'+
    '</select>'+
    '<div class="dhours '+hc+'" id="dh'+dk+'">'+fh(h)+'</div>'+
  '</div>';
}

function toggleW(wn){
  document.getElementById('wr'+wn).classList.toggle('open');
  document.getElementById('wto'+wn).classList.toggle('open');
}

function parseRaw(raw){
  var s=raw.replace(/\D/g,'');
  if(s.length===3) return ['0'+s[0],s.slice(1)];
  if(s.length===4) return [s.slice(0,2),s.slice(2)];
  if(raw.indexOf(':')>=0){
    var p=raw.split(':');
    return [p[0].padStart(2,'0'),(p[1]||'00').padStart(2,'0')];
  }
  return null;
}
function onTInput(el){
  var v=el.value.replace(/[^0-9:]/g,'');
  if(v.indexOf(':')<0&&v.length>=3) v=v.slice(0,2)+':'+v.slice(2,4);
  el.value=v;
  el.closest('.twrap').classList.remove('invalid');
}
function onTKey(e){
  if(e.key==='Enter') e.target.blur();
}
function onTBlur(el,dk,field,dayM){
  var saveM=dayM||M;
  setTimeout(function(){
    var v=el.value.trim();
    if(!v){ commitTime(dk,field,'',saveM); return; }
    var parsed=parseRaw(v);
    if(!parsed){ el.closest('.twrap').classList.add('invalid'); return; }
    var h=parseInt(parsed[0]), m=parseInt(parsed[1]);
    if(isNaN(h)||isNaN(m)||h>23||m>59){ el.closest('.twrap').classList.add('invalid'); return; }
    var val=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
    el.value=val;
    el.closest('.twrap').classList.remove('invalid');
    commitTime(dk,field,val,saveM);
  },120);
}
function commitTime(dk,field,val,saveM){
  saveM=saveM||M;
  var data=load(saveM);
  if(!data[dk]) data[dk]={};
  data[dk][field]=val;
  save(saveM,data);
  var parts=dk.split('-');
  var wn=weekNum(new Date(Y,parseInt(parts[0])-1,parseInt(parts[1])));
  updateRowUI(dk,data[dk]);
  updateWeekUI(wn);
  updateDashboard();
}
function onType(dk,type,wn,dayM){
  var saveM=dayM||M;
  var data=load(saveM);
  if(!data[dk]) data[dk]={};
  data[dk].type=type;
  save(saveM,data);
  var noTime=type==='연차'||type==='공휴일';
  ['in','out','brk'].forEach(function(f){
    var w=document.getElementById('tw'+f+dk);
    var i=document.getElementById('ti'+f+dk);
    if(w) w.classList.toggle('disabled',noTime);
    if(i) i.disabled=noTime;
  });
  updateRowUI(dk,data[dk]);
  updateWeekUI(wn);
  updateDashboard();
}
function updateRowUI(dk,rec){
  var type=rec.type||'해당없음';
  var h=calcH(rec.in,rec.out,type,rec.brk);
  var el=document.getElementById('dh'+dk);
  if(!el) return;
  el.textContent=fh(h);
  el.className='dhours '+(h>=10?'h-hi':h>=7?'h-md':h>0?'h-lo':'');
}
function updateWeekUI(wnum){
  var wmap=buildWmap();
  var wd=wmap[wnum];
  if(!wd) return;
  var wt=wdTotal(wd,load(M));
  var wtgt=weekTarget(wd);
  var diff=wt-wtgt;
  var bc=diff>0.05?'var(--red)':diff<-0.05?'var(--cyan)':wt>0?'var(--green)':'var(--border)';
  var pct=wtgt>0?Math.min(100,(wt/wtgt)*100):0;
  var hw=wd.some(function(d){return d.dow!=='토'&&d.dow!=='일';});
  var dl=!hw?'N/A':wt===0?'미입력':diff>0.05?'+'+fh(diff):diff<-0.05?'-'+fh(Math.abs(diff)):'달성';
  var dc=!hw||wt===0?'dna':diff>0.05?'dov':diff<-0.05?'dun':'dok';
  var b=document.getElementById('wbar'+wnum), t=document.getElementById('wt'+wnum), d=document.getElementById('wd'+wnum), f=document.getElementById('wf'+wnum);
  if(b){ b.style.width=pct+'%'; b.style.background=bc; }
  if(t){ t.textContent=fh(wt); t.style.color=bc; }
  if(d){ d.textContent=dl; d.className='wdiff '+dc; }
  if(f) f.innerHTML=footerHtml(wt,wtgt);
}
function updateDashboard(){ renderDashboard(buildWmap(),load(M)); }
function exportCSV(){
  var data=load(M);
  var csv='\uFEFF날짜,요일,출근,퇴근,구분,근무시간\n';
  daysInMonth(M).forEach(function(item){
    var dk=M+'-'+item.d;
    var rec=data[dk]||{};
    var type=rec.type||'해당없음';
    var h=calcH(rec.in,rec.out,type,rec.brk);
    csv+=Y+'-'+String(M).padStart(2,'0')+'-'+String(item.d).padStart(2,'0')+','+item.dow+','+(rec.in||'')+','+(rec.out||'')+','+type+','+fh(h)+'\n';
  });
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='근태_2026_'+String(M).padStart(2,'0')+'.csv';
  a.click();
}

var _origRenderDash = renderDashboard;
var _origRenderWeeks = renderWeeks;
renderDashboard = function(wmap,data){
  var mc = document.getElementById('mainContent');
  if(!document.getElementById('dashboard')) mc.innerHTML='<div id="dashboard"></div><div id="weeks"></div>';
  _origRenderDash(wmap,data);
};
renderWeeks = function(wmap,data){
  if(!document.getElementById('weeks')) document.getElementById('mainContent').innerHTML+='<div id="weeks"></div>';
  _origRenderWeeks(wmap,data);
};
</script>
</body>
</html>
